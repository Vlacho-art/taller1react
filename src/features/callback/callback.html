<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callbacks</title>
    <!--Favicon-->
    <link rel="shortcut icon" href="logosena.png" type="image/x-icon">
    <!-- Link Favicon Ctrl + Shift + R (Chrome cacheándolo)-->

    <!--SEO Tags-->
    <meta name="author" content="CRUD Datos | Feature-Based + Bootstrap 5">
    <meta name="description" content="Aplicativo web Bootstrap">
    <meta name="keywords" content="SENA, sena, Sena">

    <!--Optimization Tags-->
    <meta name="theme-color" content="#000000">
    <meta name="MobileOptimized" content="width">
    <meta name="HandhledFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-traslucent">

        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <!--CSS-->
    <link rel="stylesheet" href="../../shared/styles/style.css">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
</head>

<body>

    <header
        class="container-fluid py-3 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4"
        style="background-color: rgb(128, 128, 128);">

        <div class="d-flex gap-5">
    <a href="../../../" class="text-white text-decoration-none">Crud</a>
    <a href="../callback/callback.html" class="text-white text-decoration-none">Callback</a>
    <a href="../promise/promise.html" class="text-white text-decoration-none">Promesas</a>
    <a href="../asyncawait/Async.html" class="text-white text-decoration-none">Async await</a>
    <a href="../objectdestructuring/Destructuring.html" class="text-white text-decoration-none">Destructuring</a>
</div>


        <div class="d-flex gap-2">
            <button class="btn btn-warning" id="btnExportar">
                <i class="bi bi-download"></i> Exportar JSON
            </button>
            <button class="btn btn-danger" id="btnBorrarTodo">
                <i class="bi bi-trash3"></i> Borrar todo
            </button>
        </div>
    </header>

    <main class="container-fluid">
        <p class="h3 mb-1">Callbacks</p>
        <p class="mt-2">
            <strong>A callback</strong> is a function that runs <strong>"later"</strong>.
        </p>
        <p>
            A callback runs <strong>after another function finishes</strong>.
        </p>
        <p class="mb-0">
            Callbacks were the <strong>first solution for asynchronous JavaScript</strong>.
        </p>
        <div class="row g-4">

            <!-- FORM -->
            <div class="col-12 col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 mb-1">Búsqueda de país</h2>

                        <form id="studentForm" autocomplete="off">
                            <input type="hidden" id="studentId" />

                            <div class="mb-3">
                                <label for="name" class="form-label">Nombre del país </label>
                                <input class="form-control" id="name" required autocomplete="off" autofocus
                                    placeholder="Ej: Colombia" />
                            </div>


                            <div class="d-grid gap-2">
                                <!-- IMPORTANTE: type="button" para evitar recarga -->
                                <button class="btn btn-primary" type="button" id="btnAdd" onclick="addData()">
                                    <i class="bi bi-search"></i> Buscar
                                </button>

                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">

                        <div class="table-responsive" id="tableData">
                            <table class="table table-striped table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th scope="col">Nombre del país</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div id="emptyState" class="text-center py-4 d-none"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>


    <footer class="bg-dark">
        <p class="py-4 text-center text-light mb-0" style="background-color: rgb(128, 128, 128);">Vladimir Durango
            Vargas - Copyright © 2026</p>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
        </script>
    <script src="callback.js"></script>

</body>

</html>
